<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
<style>
  .main { stroke:#8C1D2C; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}
  .fill { fill:#8C1D2C; }
  .text { fill:#8C1D2C; font-family: Inter; font-size:102px; letter-spacing:6px;}
  .sub { fill:#666; font-family: Inter; font-size:15px; letter-spacing:2px;}
</style>

<!-- isotipo -->
<g transform="translate(20,40)">
  <circle cx="20" cy="20" r="10" class="fill"/>
  <circle cx="20" cy="80" r="10" class="fill"/>
  <circle cx="20" cy="140" r="10" class="fill"/>
  <circle cx="80" cy="20" r="10" class="fill"/>
  <circle cx="80" cy ="140" r="10" class="fill"/>
  <circle cx="140" cy="20" r="10" class="fill"/>
  <circle cx="140" cy="80" r="10" class="fill"/>
  <circle cx="140" cy="140" r="10" class="fill"/>  
  
  <line x1="140" y1="20" x2="140" y2="80" class="main"/>
  <line x1="80" y1="20" x2="140" y2="20" class="main"/>
  <line x1="20" y1="80" x2="20" y2="140" class="main"/>
  
  <!-- ECG -->
  <path class="main" 
  d="M50 90 
    L60 90 
    A 5 7 0 0 1 70 90 
    L75 90 
    L80 50 
    L85 110 
    L90 90
    L95 90
    A 5 6 0 0 1 105 90
    L115 90"/>
</g>

<!-- separador -->
<line x1="180" y1="45" x2="180" y2="195" stroke="#8C1D2C" stroke-width="3"/>

<!-- texto -->
<text x="200" y="140" class="text">
  ATESA<tspan font-weight="700">NA</tspan>
</text>
<text x="200" y="180" class="sub">
  <tspan font-weight="700">A</tspan>SOCIACIÓN DE <tspan font-weight="700">TE</tspan>CNOLOGÍAS <tspan font-weight="700">SA</tspan>NITARIAS DE <tspan font-weight="700">NA</tspan>VARRA
</text>

</svg>